parameters:
  - name: Toolchain
    type: string
    default: active
    # Expected values: 'stable', 'nightly', 'msrv', 'active' or a specific toolchain version
    # 'msrv' will read the MSRV from azure_core
    # 'active' will use the active toolchain for the working directory, which will be from rust-toolchain.toml, from a
    #   folder override or the rustup default toolchain
  - name: MaxAttempts
    type: number
    default: 3
  - name: WorkingDirectory
    type: string
    default: $(System.DefaultWorkingDirectory)
  - name: SetDefault
    type: boolean
    default: true

steps:
- task: PowerShell@2
  displayName: "Use Rust ${{ parameters.Toolchain }}"
  inputs:
    pwsh: true
    filePath: $(Build.SourcesDirectory)/eng/scripts/Use-Rust.ps1
    arguments: >
      -Toolchain '${{ parameters.Toolchain }}'
      -MaxAttempts ${{ parameters.MaxAttempts }}
      -SetDefault $${{ parameters.SetDefault }}
      -OutsideDirectory '$(Pipeline.Workspace)'
  workingDirectory: ${{ parameters.WorkingDirectory }}
