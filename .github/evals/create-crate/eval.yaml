name: create-sdk-client-eval
description: Evaluation suite for create-sdk-client.
skill: create-sdk-client
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-opus-4.6
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Did the skill complete the assigned task?
graders:
  - type: code
    name: has_output
    config:
      assertions:
        - "len(output) > 0"
  - type: regex
    name: relevant_content
    config:
      must_match:
        - "(?i)(explain|describe|analyze|implement)"
tasks:
  - "tasks/*.yaml"
