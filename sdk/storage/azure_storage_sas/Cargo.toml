[package]
name = "azure_storage_sas"
version = "1.1.0-beta.1"
description = "Microsoft Azure Storage User Delegation Shared Access Signature library for Rust"
readme = "README.md"
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[dependencies]
azure_core = { workspace = true, features = ["hmac_rust"] }
azure_identity.workspace = true
hmac.workspace = true
sha2.workspace = true
base64.workspace = true
time = { workspace = true, features = ["formatting", "macros"] }
url.workspace = true
reqwest = { workspace = true, default-features = false, features = ["json", "rustls"] }
quick-xml.workspace = true
serde.workspace = true
uuid.workspace = true

[dev-dependencies]
time = { workspace = true, features = ["formatting", "macros"] }
