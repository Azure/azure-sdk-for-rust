[package]
name = "azure_storage_blob_test"
version = "0.1.0"
description = "Common utilities for Key Vault tests"
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
homepage = "https://github.com/azure/azure-sdk-for-rust"
keywords = ["sdk", "cloud", "rest"]
categories = ["development-tools"]
publish = false

[dependencies]
async-trait.workspace = true
azure_core = { path = "../../core/azure_core", version = "1.1.0-beta.1", features = ["xml"] }
azure_core_test = { path = "../../core/azure_core_test", features = ["tracing"] }
azure_identity.path = "../../identity/azure_identity"
azure_storage_blob.path = "../azure_storage_blob"
bytes.workspace = true
futures.workspace = true
tokio = { workspace = true, features = ["rt"] }

[lints]
workspace = true
