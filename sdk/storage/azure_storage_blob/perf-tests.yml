# Performance test configuration for azure_storage_blob.
# This file is consumed by the PerfAutomation tool in Azure/azure-sdk-tools.
#
# Provision test resources (one-time, requires PowerShell Core and Az modules):
#   pwsh eng/common/TestResources/New-TestResources.ps1 -ServiceDirectory storage/azure_storage_blob -ResourceType perf
# Or set the env var manually if you already have a Storage account:
#   $env:AZURE_STORAGE_ACCOUNT_NAME = "<your-account>"
#
# Running a single test locally with cargo bench:
#   cargo bench --package azure_storage_blob --bench perf -- <test_name> <args>
#   Example: cargo bench --package azure_storage_blob --bench perf -- list_blob --count 5 --parallel 4 --duration 10
#   Use --help to see options: cargo bench --package azure_storage_blob --bench perf -- upload_blob --help
#
# Running the full matrix via PerfAutomation (requires a clone of Azure/azure-sdk-tools and .NET SDK):
#   cd <azure-sdk-tools>/tools/perf-automation/Azure.Sdk.Tools.PerfAutomation
#   dotnet run -- -l rust --language-version N/A --tests-file <path-to-this-file> --repo-root <path-to-azure-sdk-for-rust>

Service: storage-blob

Project: azure-storage-blobs-perf

PrimaryPackage: azure_storage_blob

PackageVersions:
  # - azure_storage_blob: 0.6.0
  #   azure_core: 1.7.2
  - azure_storage_blob: source
    azure_core: source

Tests:
  - Test: download
    Class: download_blob
    Arguments:
      - --size 10240 --parallel 64
      - --size 10485760 --parallel 32
      - --size 1073741824 --parallel 1 --warmup 60 --duration 60
      - --size 1073741824 --parallel 8 --warmup 60 --duration 60
      - --size 1073741824 --parallel 64 --warmup 30 --duration 60 --count 1 -l stream
      - --size 1073741824 --parallel 64 --warmup 30 --duration 60 --count 1 -l core
      - --size 1073741824 --parallel 64 --warmup 30 --duration 60 --count 1 -l simple
      - --size 1073741824 --parallel 64 --warmup 30 --duration 60 --count 1 -l into
      - --size 1073741824 --parallel 64 --warmup 30 --duration 60 --count 1 -l vec_bytes

  - Test: upload
    Class: upload_blob
    Arguments:
      - --size 10240 --parallel 64
      - --size 10485760 --parallel 32
      - --size 1073741824 --parallel 1 --warmup 60 --duration 60
      - --size 1073741824 --parallel 8 --warmup 60 --duration 60

  - Test: list-blobs
    Class: list_blob
    Arguments:
      - --count 5 --parallel 64
      - --count 500 --parallel 32
      - --count 50000 --parallel 32 --warmup 60 --duration 60
