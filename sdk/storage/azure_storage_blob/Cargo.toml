[package]
name = "azure_storage_blob"
version = "1.1.0-beta.1"
description = "Microsoft Azure Blob Storage client library for Rust"
readme = "README.md"
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
homepage = "https://github.com/azure/azure-sdk-for-rust"
documentation = "https://docs.rs/azure_storage_blob"
keywords = ["sdk", "cloud", "blobs"]
categories = ["api-bindings"]

[features]
default = ["tokio", "azure_core/default"]
tokio = ["dep:tokio", "azure_core/tokio"]

[dependencies]
async-stream.workspace = true
async-trait.workspace = true
azure_core = { path = "../../core/azure_core", version = "1.1.0-beta.1", features = ["xml"] }
azure_storage_common = { path = "../azure_storage_common", version = "0.1.0" }
bytes.workspace = true
futures.workspace = true
percent-encoding.workspace = true
pin-project.workspace = true
serde.workspace = true
serde_json.workspace = true
time.workspace = true
tokio = { workspace = true, optional = true, features = [
  "fs",
  "io-util",
  "sync",
] }

[lints]
workspace = true

[dev-dependencies]
azure_core_opentelemetry = { path = "../../core/azure_core_opentelemetry", version = "1.1.0-beta.1" }
azure_core_test = { path = "../../core/azure_core_test", version = "0.2.0", features = [
  "tracing",
] }
azure_identity = { path = "../../identity/azure_identity", version = "1.1.0-beta.1" }
azure_storage_blob_test.path = "../azure_storage_blob_test"
clap = { workspace = true, features = ["env"] }
flate2.workspace = true
futures.workspace = true
opentelemetry.workspace = true
opentelemetry-stdout.workspace = true
opentelemetry_sdk.workspace = true
rand.workspace = true
tokio = { workspace = true, features = ["macros", "rt"] }
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter", "fmt"] }

[package.metadata.docs.rs]
all-features = true

[[bench]]
name = "perf"
path = "perf/perf_tests.rs"
harness = false
