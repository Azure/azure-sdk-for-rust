[package]
name = "azure_data_cosmos_benchmarks"
version = "0.1.0"
description = "Benchmarks for the Azure Cosmos DB Rust driver"
publish = false
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[[bench]]
name = "point_read"
harness = false

[[bench]]
name = "pk_range_memory"
harness = false

[[example]]
name = "pk_range_dhat"
required-features = ["dhat-heap"]

[[example]]
name = "ppcb_state_dhat"
required-features = ["dhat-heap"]

[features]
default = []
# Enables the dhat-rs heap-profiling allocator. Off by default so that the
# regular Criterion benches are unaffected; enable when running the
# `pk_range_dhat` or `ppcb_state_dhat` examples to capture an allocation
# trace.
dhat-heap = ["dep:dhat"]

[dependencies]
async-trait.workspace = true
azure_core = { version = "0.35.0" }
azure_data_cosmos_driver = { path = "../azure_data_cosmos_driver", features = [
  "__internal_testing",
] }
dhat = { workspace = true, optional = true }
tokio = { workspace = true, features = ["rt-multi-thread", "time"] }
url.workspace = true

[dev-dependencies]
criterion.workspace = true

[lints]
workspace = true
