[package]
name = "azure_data_cosmos_driver_native"
description = "C ABI wrapper for the Azure Cosmos DB driver crate (azure_data_cosmos_driver). Exposes a schema-agnostic completion-queue-style FFI for cross-language SDK reuse (.NET, Java, Go, Python, native C/C++)."
version = "0.1.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
publish = false
keywords = ["sdk", "internal"]
categories = ["api-bindings"]

[lib]
name = "azurecosmosdriver"
crate-type = ["cdylib", "staticlib"]

[dependencies]
# Path-only — the driver crate is not (yet) a workspace dependency.
# The wrapper opts into the `tokio` feature so it can drive Tokio-backed
# completion delivery on top of the same runtime model the driver uses;
# Phase 2 adds `rustls` so `CosmosDriverRuntimeBuilder::build()` can
# actually construct an HTTP client (the driver's default factory needs
# either `rustls` or `native_tls` — `rustls` matches the driver's own
# default and avoids the OpenSSL-on-Windows breakage that bites
# `native_tls`).
azure_data_cosmos_driver = { path = "../azure_data_cosmos_driver", default-features = false, features = ["tokio", "rustls"] }
tokio = { workspace = true, features = ["rt-multi-thread", "sync", "time", "macros"] }
tracing.workspace = true

[dev-dependencies]
# Path-only — the driver crate is not (yet) a workspace dependency.
azure_core = { workspace = true, default-features = false }
tokio = { workspace = true, features = ["rt-multi-thread", "sync", "time", "macros", "test-util"] }

[build-dependencies]
cbindgen = "0.29.2"

[lints]
workspace = true
