#
# Job template for running Rust integration tests against the Cosmos DB vnext
# (Linux) emulator running in Docker on the same agent. Owned by the Cosmos
# service and lives under `sdk/cosmos/eng/` (per heaths review feedback on
# PR #4457) so changes don't require touching shared engineering infra.
#
# Triggered from `eng/pipelines/templates/stages/archetype-sdk-client.yml`'s
# generic `AdditionalStages` parameter via `sdk/cosmos/eng/cosmos-vnext-stage.yml`.
#
# HTTP-only on day one. An HTTPS-mode variant (using
# `allow_invalid_certificates` + `AZURE_COSMOS_EMULATOR_SERVER_CERT_VALIDATION_DISABLED`)
# is left as a follow-up.

parameters:
# required matrix parameters
- name: UsePlatformContainer
  type: boolean
- name: OSName
  type: string
- name: Matrix
  type: object
- name: DependsOn
  type: string
- name: CloudConfig
  type: object
# custom parameters
- name: ServiceDirectory
  type: string
- name: TimeoutInMinutes
  type: number
- name: EmulatorImage
  type: string
  default: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-preview
- name: ContainerName
  type: string
  default: cosmosdb-emulator-vnext
- name: ReadinessTimeoutSeconds
  type: number
  default: 180
# Well-known emulator master key — same value used by the legacy Windows
# emulator and accepted by the vnext image. Safe to commit; not a secret.
- name: EmulatorKey
  type: string
  default: 'C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw=='

jobs:
- job:
  displayName: "Test"
  condition: and(succeeded(), ne(variables['Skip.Tests'],'true'), ne(${{ parameters.Matrix }}, '{}'))
  timeoutInMinutes: ${{ parameters.TimeoutInMinutes }}
  dependsOn: ${{ parameters.DependsOn }}

  strategy:
    matrix: $[ ${{ parameters.Matrix }} ]

  pool:
    name: $(Pool)
    image: $(OSVmImage)
    os: ${{ parameters.OSName }}

  steps:
  - template: /eng/common/pipelines/templates/steps/sparse-checkout.yml
    parameters:
      paths:
      - "/*"

  - template: /eng/common/pipelines/templates/steps/verify-agent-os.yml
    parameters:
      AgentImage: $(OSVmImage)

  - template: /eng/pipelines/templates/steps/use-rust.yml@self
    parameters:
      Toolchain: $(RustToolchainName)

  - template: /eng/pipelines/templates/steps/vcpkg.yml

  # --- Start the vnext (Linux) emulator container ---
  # Inlined (previously a standalone step template under eng/) per PR #4457
  # review feedback to keep all vnext machinery in sdk/cosmos/eng.
  - task: Docker@0
    displayName: "Pull Cosmos DB vnext (Linux) emulator image"
    inputs:
      command: 'Run a Docker command'
      action: 'Run a Docker command'
      customCommand: 'pull ${{ parameters.EmulatorImage }}'

  - task: Docker@0
    displayName: "Run Cosmos DB vnext emulator (HTTP)"
    inputs:
      command: 'Run a Docker command'
      action: 'Run a Docker command'
      customCommand: >-
        run --detach
        --name ${{ parameters.ContainerName }}
        --publish 8081:8081
        --publish 8080:8080
        -e ENABLE_EXPLORER=false
        ${{ parameters.EmulatorImage }}

  - pwsh: |
      # Best-effort readiness probe. Tests will surface a clearer failure
      # than a stuck step if the probe never succeeds.
      $deadline = (Get-Date).AddSeconds(${{ parameters.ReadinessTimeoutSeconds }})
      $probeUrl = 'http://localhost:8080/ready'
      $ready = $false
      while ((Get-Date) -lt $deadline) {
        try {
          $resp = Invoke-WebRequest -Uri $probeUrl -UseBasicParsing -TimeoutSec 5 -ErrorAction Stop
          if ($resp.StatusCode -ge 200 -and $resp.StatusCode -lt 300) {
            Write-Host "vnext emulator reports ready (HTTP $($resp.StatusCode))."
            $ready = $true
            break
          }
        } catch {
          Write-Host "Waiting for vnext emulator readiness: $($_.Exception.Message)"
        }
        Start-Sleep -Seconds 5
      }
      if (-not $ready) {
        Write-Warning "vnext emulator readiness probe did not succeed within ${{ parameters.ReadinessTimeoutSeconds }}s — proceeding anyway."
        Write-Host "Container logs (last 50 lines):"
        docker logs --tail 50 ${{ parameters.ContainerName }} 2>&1 | Write-Host
      }
    displayName: "Wait for Cosmos DB vnext emulator to be ready"

  - template: /eng/common/pipelines/templates/steps/save-package-properties.yml@self
    parameters:
      ServiceDirectory: ${{ parameters.ServiceDirectory }}
      PackageInfoDirectory: $(Build.ArtifactStagingDirectory)/PackageInfo

  - pwsh: |
      Write-Host "##vso[task.setvariable variable=Logging__LogLevel__Default]Debug"
    displayName: 'Enable Verbose Logging'
    condition: eq(variables['System.Debug'], 'true')

  - task: Powershell@2
    displayName: "Test Packages (vnext emulator)"
    condition: succeeded()
    timeoutInMinutes: ${{ parameters.TimeoutInMinutes }}
    env:
      CIBW_BUILD_VERBOSITY: 3
      AZURE_TEST_MODE: 'live'
      AZURE_COSMOS_EMULATOR_FLAVOR: 'vnext'
      AZURE_COSMOS_CONNECTION_STRING: 'AccountEndpoint=http://localhost:8081;AccountKey=${{ parameters.EmulatorKey }};'
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)
    inputs:
      pwsh: true
      filePath: $(Build.SourcesDirectory)/eng/scripts/Test-Packages.ps1
      arguments: >
        -PackageInfoDirectory '$(Build.ArtifactStagingDirectory)/PackageInfo'

  - task: Powershell@2
    displayName: Convert Test Results to JUnit XML
    condition: succeededOrFailed()
    inputs:
      pwsh: true
      filePath: $(Build.SourcesDirectory)/eng/scripts/Convert-TestResultsToJUnit.ps1

  - task: PublishTestResults@2
    displayName: Publish Test Results
    condition: succeededOrFailed()
    inputs:
      testResultsFormat: JUnit
      testResultsFiles: '**/test-results/junit/*.xml'
      testRunTitle: Rust Tests (vnext emulator) - $(Agent.JobName)
      mergeTestResults: true
      failTaskOnFailedTests: false

  - pwsh: |
      Write-Host "Capturing vnext emulator logs (last 200 lines) for diagnostics..."
      docker logs --tail 200 ${{ parameters.ContainerName }} 2>&1 | Write-Host
      Write-Host "Removing vnext emulator container..."
      docker rm -f ${{ parameters.ContainerName }} 2>&1 | Write-Host
    displayName: "Tear down Cosmos DB vnext emulator"
    condition: always()
    continueOnError: true
