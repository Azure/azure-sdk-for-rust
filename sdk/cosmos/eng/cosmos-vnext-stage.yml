#
# Cosmos DB vnext (Linux) emulator stage. Wired into the cosmos pipeline via
# the `AdditionalStages` parameter of
# `eng/pipelines/templates/stages/archetype-sdk-client.yml`.
#
# Reuses the shared `eng/pipelines/templates/jobs/live.tests.yml` job
# template with `SkipDeployTestResources: true` so we get the full Rust
# test plumbing (sparse checkout, use-rust, vcpkg, save-package-properties,
# Test-Packages, JUnit conversion, PublishTestResults) without any Azure RM
# deploy/cleanup. The vnext emulator is a local Docker container started in
# the job's PreSteps.
#
# Non-blocking contract (triple-layered):
#   1. `dependsOn: []` — runs in parallel with Build; nothing waits on it.
#   2. Release/Pack stages do not list this stage in their dependsOn, so a
#      red vnext stage cannot block release or merge.
#   3. `Skip.VnextEmulator` pipeline variable is a kill-switch: setting it
#      to `true` skips the stage entirely with no code change.

parameters:
- name: TimeoutInMinutes
  type: number
  default: 60
- name: EmulatorImage
  type: string
  default: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-preview
- name: ContainerName
  type: string
  default: cosmosdb-emulator-vnext
- name: ReadinessTimeoutSeconds
  type: number
  default: 180
# Well-known emulator master key — same value used by the legacy Windows
# emulator and accepted by the vnext image. Safe to commit; not a secret.
- name: EmulatorKey
  type: string
  default: 'C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw=='

stages:
- stage: CosmosVNextEmulator
  displayName: Cosmos vnext emulator (Linux)
  dependsOn: []
  condition: and(succeeded(), ne(variables['Skip.VnextEmulator'], 'true'))
  variables:
  - template: /eng/pipelines/templates/variables/globals.yml
  - template: /eng/pipelines/templates/variables/image.yml
  - template: /eng/pipelines/templates/variables/rust.yml
  jobs:
  - template: /eng/common/pipelines/templates/jobs/generate-job-matrix.yml
    parameters:
      JobTemplatePath: /eng/pipelines/templates/jobs/live.tests.yml
      AdditionalParameters:
        ServiceDirectory: cosmos
        TimeoutInMinutes: ${{ parameters.TimeoutInMinutes }}
        UseFederatedAuth: false
        PersistOidcToken: false
        SkipDeployTestResources: true
        Location: ''
        EnvVars:
          AZURE_COSMOS_EMULATOR_FLAVOR: vnext
          AZURE_COSMOS_CONNECTION_STRING: 'AccountEndpoint=http://localhost:8081;AccountKey=${{ parameters.EmulatorKey }};'
        PreSteps:
          - task: Docker@0
            displayName: "Pull Cosmos DB vnext (Linux) emulator image"
            inputs:
              command: 'Run a Docker command'
              action: 'Run a Docker command'
              customCommand: 'pull ${{ parameters.EmulatorImage }}'

          - task: Docker@0
            displayName: "Run Cosmos DB vnext emulator (HTTP)"
            inputs:
              command: 'Run a Docker command'
              action: 'Run a Docker command'
              customCommand: >-
                run --detach
                --name ${{ parameters.ContainerName }}
                --publish 8081:8081
                --publish 8080:8080
                -e ENABLE_EXPLORER=false
                ${{ parameters.EmulatorImage }}

          - pwsh: |
              # Best-effort readiness probe. Tests will surface a clearer
              # failure than a stuck step if the probe never succeeds.
              $deadline = (Get-Date).AddSeconds(${{ parameters.ReadinessTimeoutSeconds }})
              $probeUrl = 'http://localhost:8080/ready'
              $ready = $false
              while ((Get-Date) -lt $deadline) {
                try {
                  $resp = Invoke-WebRequest -Uri $probeUrl -UseBasicParsing -TimeoutSec 5 -ErrorAction Stop
                  if ($resp.StatusCode -ge 200 -and $resp.StatusCode -lt 300) {
                    Write-Host "vnext emulator reports ready (HTTP $($resp.StatusCode))."
                    $ready = $true
                    break
                  }
                } catch {
                  Write-Host "Waiting for vnext emulator readiness: $($_.Exception.Message)"
                }
                Start-Sleep -Seconds 5
              }
              if (-not $ready) {
                Write-Warning "vnext emulator readiness probe did not succeed within ${{ parameters.ReadinessTimeoutSeconds }}s — proceeding anyway."
                Write-Host "Container logs (last 50 lines):"
                docker logs --tail 50 ${{ parameters.ContainerName }} 2>&1 | Write-Host
              }
            displayName: "Wait for Cosmos DB vnext emulator to be ready"
        PostSteps:
          - pwsh: |
              Write-Host "Capturing vnext emulator logs (last 200 lines) for diagnostics..."
              docker logs --tail 200 ${{ parameters.ContainerName }} 2>&1 | Write-Host
              Write-Host "Removing vnext emulator container..."
              docker rm -f ${{ parameters.ContainerName }} 2>&1 | Write-Host
            displayName: "Tear down Cosmos DB vnext emulator"
            condition: always()
            continueOnError: true
      MatrixConfigs:
        - Name: Cosmos_vnext_emulator
          Path: sdk/cosmos/vnext-emulator-matrix.json
          Selection: sparse
          GenerateVMJobs: true
      CloudConfig:
        Cloud: Public
