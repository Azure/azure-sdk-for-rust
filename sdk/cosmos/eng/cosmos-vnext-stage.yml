#
# Cosmos DB vnext (Linux) emulator stage. Wired into the cosmos pipeline via
# the `AdditionalStages` parameter of
# `eng/pipelines/templates/stages/archetype-sdk-client.yml`.
#
# This stage is intentionally NON-BLOCKING:
#   1. `dependsOn: []` — runs in parallel with Build; nothing waits on it.
#   2. The Release/Pack stages do not list it in their dependsOn, so a red
#      vnext stage cannot block release or merge.
#   3. The `Skip.VnextEmulator` pipeline variable acts as a kill-switch:
#      setting it to `true` skips the stage entirely with no code change.
#
# This mirrors the pattern used by azure-sdk-for-java to ship the same
# emulator flavor with low risk while it's still in preview.

parameters:
- name: TimeoutInMinutes
  type: number
  default: 60

stages:
- stage: CosmosVNextEmulator
  displayName: Cosmos vnext emulator (Linux)
  dependsOn: []
  condition: and(succeeded(), ne(variables['Skip.VnextEmulator'], 'true'))
  variables:
  - template: /eng/pipelines/templates/variables/globals.yml
  - template: /eng/pipelines/templates/variables/image.yml
  - template: /eng/pipelines/templates/variables/rust.yml
  jobs:
  - template: /eng/common/pipelines/templates/jobs/generate-job-matrix.yml
    parameters:
      JobTemplatePath: /eng/pipelines/templates/jobs/vnext-emulator.tests.yml
      AdditionalParameters:
        ServiceDirectory: cosmos
        TimeoutInMinutes: ${{ parameters.TimeoutInMinutes }}
        Https: false
      MatrixConfigs:
        - Name: Cosmos_vnext_emulator
          Path: sdk/cosmos/vnext-emulator-matrix.json
          Selection: sparse
          GenerateVMJobs: true
      CloudConfig:
        Cloud: Public
