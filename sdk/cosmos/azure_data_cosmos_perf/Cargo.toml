[package]
name = "azure_data_cosmos_perf"
version = "0.1.0"
description = "Performance and scale testing tool for the Azure Cosmos DB Rust SDK"
publish = false
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[dependencies]
async-trait.workspace = true
azure_core = { workspace = true, features = ["reqwest"] }
azure_data_cosmos = { workspace = true, features = ["key_auth"] }
azure_identity.workspace = true
clap = { workspace = true, features = ["derive", "env"] }
futures.workspace = true
hdrhistogram.workspace = true
hostname.workspace = true
rand.workspace = true
serde.workspace = true
serde_json.workspace = true
sysinfo.workspace = true
time.workspace = true
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "time", "signal"] }
uuid.workspace = true
console-subscriber = { workspace = true, optional = true }

# Optional: tokio runtime metrics (scheduling delay, poll times, worker utilization)
tokio-metrics = { workspace = true, optional = true }

[features]
default = []
tokio-console = ["dep:console-subscriber", "tokio/tracing"]
tokio-metrics = ["dep:tokio-metrics"]

[lints]
workspace = true
