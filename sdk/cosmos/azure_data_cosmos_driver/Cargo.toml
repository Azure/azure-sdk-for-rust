[package]
name = "azure_data_cosmos_driver"
version = "0.1.0"
description = "Core implementation layer for Azure Cosmos DB - provides transport, routing, and protocol handling for cross-language SDK reuse"
readme = "README.md"
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
homepage = "https://github.com/azure/azure-sdk-for-rust"
documentation = "https://docs.rs/azure_data_cosmos_driver"
keywords = ["sdk", "azure", "cosmos", "driver", "internal"]
categories = ["api-bindings"]
publish = false # Internal implementation layer, not yet ready for crates.io

[dependencies]
async-trait.workspace = true
azure_core.workspace = true
futures.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
url.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }

[lints]
workspace = true

[features]
default = []
