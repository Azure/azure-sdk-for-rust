[package]
name = "azure_data_cosmos_driver"
version = "0.3.0"
description = "Core implementation layer for Azure Cosmos DB - provides transport, routing, and protocol handling for cross-language SDK reuse"
readme = "README.md"
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
homepage = "https://github.com/azure/azure-sdk-for-rust"
documentation = "https://docs.rs/azure_data_cosmos_driver"
keywords = ["sdk", "internal"]
categories = ["api-bindings"]


[dependencies]
arc-swap.workspace = true
async-lock.workspace = true
async-trait.workspace = true
azure_core = { version = "0.35.0", default-features = false, features = [
  "hmac_rust",
] }
azure_data_cosmos_macros.workspace = true
base64.workspace = true
bytes.workspace = true
crossbeam-epoch = { workspace = true, features = ["std"] }
futures.workspace = true
h2 = { workspace = true, optional = true }
rand = { workspace = true, optional = true }
reqwest = { workspace = true, optional = true }
serde.workspace = true
serde_json.workspace = true
tokio = { workspace = true, optional = true, features = ["rt", "time"] }
tracing.workspace = true
url.workspace = true
uuid = { workspace = true, features = ["v4", "fast-rng"] }

[dev-dependencies]
azure_identity = { version = "0.35.0" }
quick-xml.workspace = true
serde = { workspace = true, features = ["derive"] }
tokio = { workspace = true, features = [
  "rt-multi-thread",
  "macros",
  "time",
  "test-util",
] }
tracing-subscriber = { workspace = true, features = ["env-filter", "fmt"] }
uuid = { workspace = true, features = ["v4", "fast-rng"] }

[target.'cfg(windows)'.dependencies]
windows = { workspace = true, features = [
  "Win32_Foundation",
  "Win32_System_Threading",
  "Win32_System_SystemInformation",
] }

[lints]
workspace = true


[features]
default = ["tokio", "rustls"]
tokio = ["dep:tokio"]
reqwest = [
  "dep:h2",
  "dep:reqwest",
  "reqwest/http2",
  "azure_core/reqwest",
  "azure_core/tokio",
]
rustls = ["reqwest", "reqwest/rustls", "__tls"]
native_tls = ["reqwest", "reqwest/native-tls", "__tls"]
fault_injection = ["dep:rand"]
__internal_mocking = []
__tls = []

[package.metadata.docs.rs]
features = [
  "fault_injection",
  "native_tls",
  "rustls",
  "tokio",
]
